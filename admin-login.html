<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PROVEXA — Login Panel</title>
    <link rel="stylesheet" href="styles/styles.css">
    <link rel="stylesheet" href="styles/admin.css">
    <style>
      .login-wrap{min-height:60vh;display:flex;align-items:center;justify-content:center;padding:20px 0}
      .login-card{width:min(360px, 100%);background:#fff;padding:24px;border-radius:16px;box-shadow:0 18px 40px rgba(8,42,102,.12)}
      .login-card h2{margin:0 0 18px;color:var(--navy)}
      .form-row{display:flex;flex-direction:column;gap:14px;margin-bottom:18px}
    </style>
  </head>
  <body>
    <header class="site-header">
      <div class="container header-inner">
        <a class="brand" href="index.html">
          <img src="assets/logo.png" alt="PROVEXA logo" class="logo">
        </a>
      </div>
    </header>

    <main class="container login-wrap">
      <div class="login-card">
        <h2>Acceso administrador</h2>
        <div class="form-row">
          <div class="form-group">
            <label for="adminUser">Correo electrónico</label>
            <input id="adminUser" type="email" autocomplete="email" class="input-field">
          </div>
          <div class="form-group">
            <label for="adminPass">Contraseña</label>
            <input id="adminPass" type="password" autocomplete="current-password" class="input-field">
          </div>
        </div>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button id="loginBtn" class="btn primary">Entrar</button>
        </div>
        <p id="loginError" style="color:#b00020;margin-top:12px;display:none">Credenciales inválidas</p>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
    <script src="scripts/supabase-client.js"></script>
    <script src="scripts/admin-auth.js"></script>
    <script>
      var loginBtn = document.getElementById('loginBtn');
      loginBtn.addEventListener('click', async function(){
        var u = document.getElementById('adminUser').value.trim();
        var p = document.getElementById('adminPass').value;
        document.getElementById('loginError').style.display = 'none';
        loginBtn.disabled = true;
        loginBtn.textContent = 'Entrando...';
        var ok = await AdminAuth.login(u, p);
        if(ok){
          location.href = 'admin.html';
        } else {
          document.getElementById('loginError').style.display = 'block';
          loginBtn.disabled = false;
          loginBtn.textContent = 'Entrar';
        }
      });
      // allow enter key
      ['adminUser','adminPass'].forEach(function(id){ document.getElementById(id).addEventListener('keydown', function(e){ if(e.key==='Enter') loginBtn.click(); }); });
    </script>
  </body>
</html>
